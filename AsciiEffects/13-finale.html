<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASCII Cinematic Universe — Finale Edition</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        overflow: hidden;
        background: black;
        width: 100%;
        height: 100%;
        font-family: Consolas, monospace;
    }

    canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    body::before {
        content: "";
        pointer-events: none;
        position: fixed;
        inset: 0;
        background:
            repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 1px,
                transparent 2px,
                transparent 4px
            );
        mix-blend-mode: overlay;
        z-index: 20;
    }

    body::after {
        content: "";
        pointer-events: none;
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.5));
        z-index: 20;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 30;
        display: flex;
        gap: 10px;
        align-items: center;
        color: white;
        text-shadow: 0 0 10px currentColor;
        transition: opacity 0.3s;
    }

    button {
        background: rgba(0,0,0,0.5);
        color: inherit;
        border: 1px solid currentColor;
        padding: 10px 16px;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 2px;
        backdrop-filter: blur(4px);
    }

    button:hover {
        background: rgba(255,255,255,0.1);
    }

    #message {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        color: white;
        font-size: 20px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px currentColor;
        pointer-events: none;
        opacity: 0.9;
    }

    .shake {
        animation: shake 0.08s infinite;
    }

    @keyframes shake {
        0% { transform: translate(2px, 1px); }
        25% { transform: translate(-2px, 1px); }
        50% { transform: translate(2px, -2px); }
        75% { transform: translate(-1px, 2px); }
        100% { transform: translate(1px, -1px); }
    }
</style>
</head>
<body>
<div id="ui">
    <button id="toggleFX">FX: ON</button>
    <button id="overdrive">OVERDRIVE</button>
    <div id="heat">HEAT: 0°C</div>
</div>
<div id="message">BOOTING REALITY...</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w = canvas.width = innerWidth;
let h = canvas.height = innerHeight;

window.addEventListener('resize', () => {
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
});

const mouse = { x: w / 2, y: h / 2, down: false };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup', () => mouse.down = false);

let scrollDepth = 0;
window.addEventListener('wheel', e => { scrollDepth += Math.sign(e.deltaY); });

const message = document.getElementById('message');
const heatText = document.getElementById('heat');
const overdriveBtn = document.getElementById('overdrive');
const toggleFXBtn = document.getElementById('toggleFX');

let effectsEnabled = true;
function applyFXState() {
    if (effectsEnabled) {
        document.body.style.filter = 'contrast(1.05) brightness(1.02)';
        toggleFXBtn.textContent = 'FX: ON';
    } else {
        document.body.style.filter = 'none';
        toggleFXBtn.textContent = 'FX: OFF';
    }
}
toggleFXBtn.onclick = () => { effectsEnabled = !effectsEnabled; applyFXState(); };
applyFXState();

const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+=-';
const quantumChars = '+-/*%';
const structures = '▓▒░█';

let act = 1;
let frame = 0;
let heat = 0;
let particles = [];
let stars = [];
let planets = [];
let cells = [];
let quantum = [];
let finalArt = [];
let echoes = []; // Added for Aftermath
let aftermathTimer = 0; // Added for Aftermath

const palette = {
    forge: '#00ff88',
    danger: '#ff3300',
    cosmic: '#66ccff',
    micro: '#88ffcc',
    quantum: '#ffffff',
    singularity: '#ff00ff'
};

function setMessage(text) { message.textContent = text; }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randomChar() { return chars[Math.floor(Math.random() * chars.length)]; }

class Particle {
    constructor(x, y, char, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.char = char; this.color = color;
        this.size = 16; this.life = 1;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = effectsEnabled ? 10 : 0;
        ctx.shadowColor = this.color;
        ctx.fillText(this.char, this.x, this.y);
    }
    update() { this.x += this.vx; this.y += this.vy; }
}

/* ACT I — THE FORGE */
function initForge() {
    particles = [];
    for (let i = 0; i < 400; i++) {
        particles.push(new Particle(w / 2 + (Math.random() - 0.5) * 100, h / 2 + (Math.random() - 0.5) * 100, randomChar(), palette.forge));
    }
    setMessage('THE FORGE // PRESS OVERDRIVE');
}

function updateForge() {
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = palette.forge;
    ctx.font = '16px Consolas';
    const beltY = h / 2;
    for (let x = 0; x < w; x += 20) { ctx.fillText('=', (x + frame * 4) % (w + 20), beltY); }
    particles.forEach(p => {
        p.vx += (Math.sin(frame * 0.01 + p.y * 0.01)) * 0.02;
        if (heat > 500) p.vy += 0.01;
        p.update(); p.draw();
        if (Math.random() < 0.03) p.char = rand(structures);
    });
    heat += 0.5;
    heatText.innerHTML = `HEAT: ${Math.floor(heat)}°C`;
    if (heat > 700) document.body.classList.add('shake');
    if (heat >= 1000) explodeForge();
}

function explodeForge() {
    act = 2;
    document.body.classList.remove('shake');
    particles.forEach(p => { p.vx = (Math.random() - 0.5) * 15; p.vy = (Math.random() - 0.5) * 15; });
    setTimeout(() => { initMacro(); }, 2500);
}

overdriveBtn.onclick = () => { heat += 120; };

/* ACT II — THE MACRO */
function initMacro() {
    act = 2; stars = []; planets = [];
    for (let i = 0; i < 300; i++) { stars.push({ x: Math.random() * w, y: Math.random() * h, phase: Math.random() * Math.PI * 2 }); }
    for (let i = 0; i < 6; i++) {
        planets.push({ radius: 80 + i * 55, angle: Math.random() * Math.PI * 2, speed: 0.002 + i * 0.0007, char: ['o', '0', '@', '#', '*', '&'][i], size: 18 + i, id: i });
    }
    setMessage('CLICK A PLANET TO SCAN');
}

window.addEventListener('click', e => {
    if (act !== 2) return;
    const cx = w / 2; const cy = h / 2;
    for (const p of planets) {
        const x = cx + Math.cos(p.angle) * p.radius;
        const y = cy + Math.sin(p.angle) * p.radius;
        if (Math.hypot(e.clientX - x, e.clientY - y) < 20) initMicro();
    }
});

function updateMacro() {
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,10,0.25)' : 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '16px Consolas';
    stars.forEach(s => {
        const glow = (Math.sin(frame * 0.03 + s.phase) + 1) / 2;
        ctx.fillStyle = `rgba(255,255,255,${glow})`;
        ctx.fillText('.', s.x, s.y);
    });
    ctx.fillStyle = '#ffff88';
    ctx.shadowBlur = effectsEnabled ? 30 : 0;
    ctx.shadowColor = '#ffff88';
    ctx.font = '40px Consolas';
    ctx.fillText('@', w / 2, h / 2);
    planets.forEach(p => {
        p.angle += p.speed;
        const x = w / 2 + Math.cos(p.angle) * p.radius;
        const y = h / 2 + Math.sin(p.angle) * p.radius;
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath(); ctx.arc(w / 2, h / 2, p.radius, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = palette.cosmic;
        ctx.font = `${p.size}px Consolas`;
        ctx.fillText(p.char, x, y);
    });
}

/* ACT III — THE MICRO */
function initMicro() {
    act = 3; cells = [];
    for (let y = 0; y < h; y += 18) { for (let x = 0; x < w; x += 18) { cells.push({ x, y }); } }
    setMessage('MICROSCOPIC STRUCTURES // SCROLL DEEPER');
}

function updateMicro() {
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '16px Consolas';
    cells.forEach((c, i) => {
        const pulse = Math.sin(frame * 0.03 + c.x * 0.02) + Math.sin(frame * 0.04 + c.y * 0.03);
        const offset = pulse * 3;
        const dist = Math.hypot(mouse.x - c.x, mouse.y - c.y);
        const reveal = dist < 120;
        ctx.fillStyle = reveal ? '#00ffaa' : palette.micro;
        ctx.shadowBlur = effectsEnabled ? (reveal ? 20 : 5) : 0;
        const ch = reveal ? (Math.random() > 0.5 ? '0' : '1') : (pulse > 0 ? 'O' : 'C');
        ctx.fillText(ch, c.x + offset, c.y + offset);
    });
    if (scrollDepth > 8 || mouse.down) initQuantum();
}

/* ACT IV — THE QUANTUM VOID */
let quantumTimer = 900;
function initQuantum() {
    act = 4; quantum = [];
    for (let y = 0; y < h; y += 14) { for (let x = 0; x < w; x += 14) { quantum.push({ x, y, char: rand(quantumChars) }); } }
    quantumTimer = 900;
    setMessage('OBSERVER EFFECT DETECTED');
}

function updateQuantum() {
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,0,0.22)' : 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '14px Consolas';
    quantum.forEach(q => {
        const dist = Math.hypot(mouse.x - q.x, mouse.y - q.y);
        const influence = Math.max(0, 1 - dist / 250);
        if (Math.random() < influence * 0.5) q.char = rand(quantumChars);
        const alpha = 0.2 + influence;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillText(q.char, q.x + (Math.random() - 0.5) * influence * 10, q.y + (Math.random() - 0.5) * influence * 10);
    });
    quantumTimer--;
    setMessage(`REALITY COLLAPSE IN ${Math.floor(quantumTimer / 60)}`);
    if (quantumTimer <= 0) initSingularity();
}

/* ACT V — THE SINGULARITY */
let singularityPhase = 0;
let singularityTimer = 0;
function initSingularity() {
    act = 5; particles = [];
    for (let i = 0; i < 2500; i++) { particles.push({ x: Math.random() * w, y: Math.random() * h, vx: 0, vy: 0, char: rand(chars) }); }
    singularityPhase = 0;
    singularityTimer = 0;
    setMessage('GRAVITATIONAL SINGULARITY');
}

function updateSingularity() {
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;

    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = effectsEnabled ? 40 : 0;
    ctx.shadowColor = '#ffffff';
    ctx.font = '30px Consolas';
    ctx.fillText('Ø', cx, cy);

    let remaining = 0;
    singularityTimer++;

    particles.forEach(p => {
        const dx = cx - p.x;
        const dy = cy - p.y;
        const distSq = dx * dx + dy * dy + 0.1;
        const dist = Math.sqrt(distSq);

        // Stronger pull as they get closer
        const force = 2000 / distSq;
        const angle = Math.atan2(dy, dx);

        p.vx += Math.cos(angle) * force;
        p.vy += Math.sin(angle) * force;

        // Friction to prevent infinite orbiting
        p.vx *= 0.95;
        p.vy *= 0.95;

        p.x += p.vx;
        p.y += p.vy;

        // Only draw and count if they haven't hit the "event horizon"
        if (dist > 15) {
            remaining++;
            ctx.fillStyle = palette.singularity;
            ctx.font = '14px Consolas';
            ctx.fillText(p.char, p.x, p.y);
        }
    });

    // TRIGGER TRANSITION: 
    // If particles are gone OR if 15 seconds have passed (safety net)
    if ((remaining < 10 || singularityTimer > 900) && singularityPhase === 0) {
        singularityPhase = 1;
        setMessage('CRITICAL MASS REACHED');
        
        // Brief white flash effect
        setTimeout(() => {
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,w,h);
            bigBang();
        }, 2000);
    }
}

/* ACT VI — FINAL BIG BANG */
function bigBang() {
    act = 6; finalArt = [];
    for (let i = 0; i < 5000; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * Math.min(w, h) * 0.45;
        finalArt.push({ x: w / 2 + Math.cos(angle) * radius, y: h / 2 + Math.sin(angle) * radius, char: rand(['#', '@', '%', '&', '*', '░', '▓', '▒']), color: `hsl(${Math.random() * 360},100%,70%)` });
    }
    setMessage('SYSTEM REBOOTED');
    
    // Trigger the Aftermath expansion after 12 seconds
    setTimeout(() => {
        initAftermath();
    }, 12000);
}

function updateFinale() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '14px Consolas';
    finalArt.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.shadowBlur = effectsEnabled ? 10 : 0;
        ctx.shadowColor = f.color;
        ctx.fillText(f.char, f.x, f.y);
    });
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 30;
    ctx.font = '48px Consolas';
    ctx.fillText('SYSTEM REBOOTED', w / 2, h - 100);
}

/* ACT VII — THE AFTERMATH */
function initAftermath() {
    act = 7;
    echoes = [];
    for (let i = 0; i < 4000; i++) {
        echoes.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            char: rand(['#','@','%','░','▒','▓','0','1','O','C','+','-','/']),
            phase: Math.random() * Math.PI * 2,
            memory: Math.random()
        });
    }
    aftermathTimer = 0;
    setMessage('REBOOT SUCCESSFUL // WARNING: RESIDUAL MEMORY DETECTED');
}

function updateAftermath() {
    aftermathTimer++;
    ctx.fillStyle = effectsEnabled ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,w,h);
    const centerX = w / 2;
    const centerY = h / 2;
    const breathing = Math.sin(frame * 0.01) * 80;

    echoes.forEach((e) => {
        const memoryWave = Math.sin(frame * 0.01 + e.phase);
        e.vx += Math.sin(frame * 0.002 + e.y * 0.01) * 0.002;
        e.vy += Math.cos(frame * 0.003 + e.x * 0.01) * 0.002;
        const dx = centerX - e.x;
        const dy = centerY - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) + 0.01;
        const gravity = 0.02 / dist;
        e.vx += dx * gravity;
        e.vy += dy * gravity;
        const mouseDist = Math.hypot(mouse.x - e.x, mouse.y - e.y);
        if (mouseDist < 120 && Math.random() < 0.2) {
            e.char = rand(['#','@','%','0','1','*','+','Ø']);
        }
        e.x += e.vx; e.y += e.vy;
        if (e.x < 0) e.x = w; if (e.x > w) e.x = 0;
        if (e.y < 0) e.y = h; if (e.y > h) e.y = 0;

        const hue = (180 + Math.sin(frame * 0.01 + e.phase) * 180 + mouseDist * 0.05) % 360;
        ctx.fillStyle = `hsla(${hue},100%,70%,0.8)`;
        ctx.shadowBlur = effectsEnabled ? (12 + memoryWave * 8) : 0;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillText(e.char, e.x + Math.sin(frame * 0.01 + e.phase) * 4, e.y + Math.cos(frame * 0.01 + e.phase) * 4);
    });

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, 100 + i * 60 + breathing, 0, Math.PI * 2);
        ctx.stroke();
    }

    const eyeX = centerX + Math.sin(frame * 0.01) * 100;
    const eyeY = centerY + Math.cos(frame * 0.013) * 100;
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = effectsEnabled ? 40 : 0;
    ctx.shadowColor = '#ffffff';
    ctx.font = '42px Consolas';
    ctx.fillText('Ø', eyeX, eyeY);

    if (Math.sin(frame * 0.002) > 0.995) setMessage('SOMETHING REMEMBERED YOU');
    if (Math.sin(frame * 0.0015) > 0.998) setMessage('THE UNIVERSE IS DREAMING AGAIN');
}

/* MASTER LOOP */
function loop() {
    frame++;
    switch (act) {
        case 1: updateForge(); break;
        case 2: updateMacro(); break;
        case 3: updateMicro(); break;
        case 4: updateQuantum(); break;
        case 5: updateSingularity(); break;
        case 6: updateFinale(); break;
        case 7: updateAftermath(); break;
    }
    requestAnimationFrame(loop);
}

ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
initForge();
loop();
</script>
</body>
</html>
