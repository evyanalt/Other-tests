<!-- Initialize the html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ASCII Sandbox</title>
<!-- Style for the page -->
<style>
body{
    background:#0b0f14;
    color:white;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:20px;
}

#world{
    white-space:pre;
    line-height:1;
    font-size:16px;
    cursor:crosshair;
    user-select:none;

    background:#111827;
    padding:16px;
    border-radius:12px;
}
</style>
</head>
<body> <!-- The actual visible page, but because it will be generated by the JavaScript there will not be much over here -->

<h1>ASCII Sandbox</h1>

<div id="toolbar"> <!-- Toolbar -->
    <button data-char="#">Wall</button>
    <button data-char="~">Water</button>
    <button data-char="S">Sand</button>
    <button data-char="T">Tree</button>
    <button data-char=".">Erase</button>
</div>

<div id="world"></div>

<script src="sandbox.js"></script> <!-- Link the js file  -->

</body>
</html>
