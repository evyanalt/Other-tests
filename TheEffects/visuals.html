<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chaos Visuals</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

#status{
    position:fixed;
    top:20px;
    left:20px;

    color:white;
    font-family:monospace;
    font-size:14px;

    background:rgba(0,0,0,.5);
    padding:10px 14px;
    border-radius:10px;

    pointer-events:none;

    transition:opacity .5s;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="status">
Waiting for Chaos Control...<br>
<span id="modeName"></span>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

const statusBox = document.getElementById("status");
const modeText = document.getElementById("modeName");

let connected = false;

const channel = new BroadcastChannel("chaos");

channel.onmessage = e => {

    connected = true;
    statusBox.style.opacity = 0;

    if(e.data.mode){
        setMode(e.data.mode);
    }

};

const favoriteModes = [
    "organism",
    "swarm",
    "bionet",
    "cells",
    "recursive",
    "fracture"
];

let mode =
favoriteModes[
    Math.floor(Math.random()*favoriteModes.length)
];

modeText.textContent =
"Current Mode: " + mode;

function setMode(newMode){

    mode = newMode;

    modeText.textContent =
        "Current Mode: " + newMode;

}

const mouse = {
    x:window.innerWidth/2,
    y:window.innerHeight/2
};

window.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

/////////////////////////////////////////////////
// ORGANISM
/////////////////////////////////////////////////

const organismNodes =
Array.from({length:120},()=>({

    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,

    dx:(Math.random()-.5)*2,
    dy:(Math.random()-.5)*2

}));

function drawOrganism(){

    ctx.fillStyle="rgba(0,0,0,.12)";
    ctx.fillRect(0,0,w,h);

    organismNodes.forEach(a=>{

        a.x+=a.dx;
        a.y+=a.dy;

        if(a.x<0||a.x>w)a.dx*=-1;
        if(a.y<0||a.y>h)a.dy*=-1;

        organismNodes.forEach(b=>{

            const dist =
            Math.hypot(
                a.x-b.x,
                a.y-b.y
            );

            if(dist<120){

                ctx.strokeStyle=
                `hsla(${dist*2+Date.now()*.02},
                100%,70%,${1-dist/120})`;

                ctx.beginPath();
                ctx.moveTo(a.x,a.y);
                ctx.lineTo(b.x,b.y);
                ctx.stroke();
            }

        });

        ctx.fillStyle="white";

        ctx.beginPath();
        ctx.arc(a.x,a.y,2,0,Math.PI*2);
        ctx.fill();

    });

}

/////////////////////////////////////////////////
// SWARM
/////////////////////////////////////////////////

const swarm =
Array.from({length:250},()=>({

    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,

    vx:0,
    vy:0

}));

function drawSwarm(){

    ctx.fillStyle="rgba(0,0,0,.08)";
    ctx.fillRect(0,0,w,h);

    swarm.forEach(a=>{

        let cx=0;
        let cy=0;
        let count=0;

        swarm.forEach(b=>{

            const dist =
            Math.hypot(
                a.x-b.x,
                a.y-b.y
            );

            if(dist<90){

                cx+=b.x;
                cy+=b.y;
                count++;

                ctx.strokeStyle=
                `hsla(${dist*3+Date.now()*.03},
                100%,70%,${1-dist/90})`;

                ctx.beginPath();
                ctx.moveTo(a.x,a.y);
                ctx.lineTo(b.x,b.y);
                ctx.stroke();

            }

        });

        if(count){

            cx/=count;
            cy/=count;

            a.vx += (cx-a.x)*0.0005;
            a.vy += (cy-a.y)*0.0005;

        }

        a.vx += (mouse.x-a.x)*0.00002;
        a.vy += (mouse.y-a.y)*0.00002;

        a.x += a.vx;
        a.y += a.vy;

        a.vx *= .98;
        a.vy *= .98;

        if(a.x<0)a.x=w;
        if(a.x>w)a.x=0;
        if(a.y<0)a.y=h;
        if(a.y>h)a.y=0;

        ctx.fillStyle="white";

        ctx.beginPath();
        ctx.arc(a.x,a.y,2,0,Math.PI*2);
        ctx.fill();

    });

}

/////////////////////////////////////////////////
// BIO NET
/////////////////////////////////////////////////

let bioPulse = 0;

function drawBioNet(){

    ctx.fillStyle="rgba(0,0,0,.15)";
    ctx.fillRect(0,0,w,h);

    for(let i=0;i<80;i++){

        const angle =
        i*0.4+bioPulse;

        const radius =
        200+
        Math.sin(i+bioPulse)*80;

        const x1 =
        w/2+
        Math.cos(angle)*radius;

        const y1 =
        h/2+
        Math.sin(angle)*radius;

        for(let j=0;j<8;j++){

            const a2=
            angle+j*.5+bioPulse;

            const r2=
            radius+
            Math.sin(j+bioPulse)*50;

            const x2=
            w/2+
            Math.cos(a2)*r2;

            const y2=
            h/2+
            Math.sin(a2)*r2;

            ctx.strokeStyle=
            `hsla(${i*5+bioPulse*100},
            100%,70%,.3)`;

            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.stroke();

        }

        ctx.fillStyle="white";

        ctx.beginPath();
        ctx.arc(x1,y1,3,0,Math.PI*2);
        ctx.fill();

    }

    bioPulse+=0.01;

}

/////////////////////////////////////////////////
// VOID CELLS
/////////////////////////////////////////////////

const cells =
Array.from({length:140},()=>({

    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,

    dx:(Math.random()-.5)*2,
    dy:(Math.random()-.5)*2,

    size:5+Math.random()*15

}));

function drawCells(){

    ctx.fillStyle="rgba(0,0,0,.08)";
    ctx.fillRect(0,0,w,h);

    cells.forEach(a=>{

        a.x+=a.dx;
        a.y+=a.dy;

        if(a.x<0||a.x>w)a.dx*=-1;
        if(a.y<0||a.y>h)a.dy*=-1;

        const g=
        ctx.createRadialGradient(
            a.x,a.y,0,
            a.x,a.y,a.size
        );

        g.addColorStop(
            0,
            "rgba(255,255,255,.7)"
        );

        g.addColorStop(
            1,
            "rgba(0,0,0,0)"
        );

        ctx.fillStyle=g;

        ctx.beginPath();
        ctx.arc(
            a.x,
            a.y,
            a.size,
            0,
            Math.PI*2
        );
        ctx.fill();

    });

}
/////////////////////////////////////////////////
// RECURSIVE (SAFE VERSION)
/////////////////////////////////////////////////

let recursionTick = 0;

function drawRecursive(){

    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,w,h);

    ctx.save();

    ctx.translate(w/2,h/2);
    ctx.rotate(recursionTick * 0.01);
    ctx.scale(0.99,0.99);
    ctx.translate(-w/2,-h/2);

    ctx.drawImage(canvas,0,0,w,h);

    ctx.restore();

    ctx.strokeStyle = "rgba(255,255,255,0.2)";

    for(let i=0;i<10;i++){

        ctx.strokeRect(
            w/2 - i*30,
            h/2 - i*30,
            i*60,
            i*60
        );

    }

    recursionTick++;
}

/////////////////////////////////////////////////
// FRACTURE (DIMENSION SPLIT)
/////////////////////////////////////////////////

let fractureTick = 0;

function drawFracture(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    for(let i=0;i<25;i++){

        const x =
        w/2 + Math.sin(fractureTick*0.01 + i)*300;

        const y =
        h/2 + Math.cos(fractureTick*0.013 + i)*300;

        ctx.save();

        ctx.translate(x,y);
        ctx.rotate(fractureTick*0.01 + i);

        ctx.drawImage(
            canvas,
            -w/4,
            -h/4,
            w/2,
            h/2
        );

        ctx.restore();
    }

    fractureTick++;
}

/////////////////////////////////////////////////
// VHS GLITCH
/////////////////////////////////////////////////

function drawVHS1(){

    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,w,h);

    // image jitter
    ctx.drawImage(
        canvas,
        Math.random()*10-5,
        Math.random()*6-3,
        w,
        h
    );

    // scanlines
    for(let i=0;i<h;i+=3){

        ctx.fillStyle =
        `rgba(255,255,255,0.03)`;

        ctx.fillRect(0,i,w,1);
    }

    // noise bars
    for(let i=0;i<20;i++){

        ctx.fillStyle =
        `rgba(0,255,255,${Math.random()*0.05})`;

        ctx.fillRect(
            Math.random()*w,
            Math.random()*h,
            Math.random()*300,
            2
        );
    }
}
function drawVHS(){

    // trailing fade
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,w,h);

    // frame jitter (horizontal wobble)
    ctx.drawImage(
        canvas,
        Math.sin(Date.now()*0.01)*6,
        Math.random()*2-1,
        w,
        h
    );

    // scanlines
    for(let y=0;y<h;y+=2){

        ctx.fillStyle =
        `rgba(255,255,255,${Math.random()*0.03})`;

        ctx.fillRect(0,y,w,1);
    }

    // distortion bars
    for(let i=0;i<15;i++){

        ctx.fillStyle =
        `rgba(0,255,255,${Math.random()*0.06})`;

        ctx.fillRect(
            Math.random()*w,
            Math.random()*h,
            Math.random()*300,
            2
        );
    }

    // vertical tear
    if(Math.random()<0.1){

        const slice = Math.random()*h;

        ctx.drawImage(
            canvas,
            0,slice,w,50,
            Math.random()*10-5,slice,w,50
        );
    }
}

/////////////////////////////////////////////////
// ASCII VOID
/////////////////////////////////////////////////

const ascii = " .:-=+*#%@";

function drawASCII(){

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,w,h);

    ctx.font = "10px monospace";

    for(let y=0;y<h;y+=10){

        for(let x=0;x<w;x+=8){

            const v =
            Math.sin(x*0.02 + Date.now()*0.001) +
            Math.cos(y*0.02 + Date.now()*0.001);

            const index =
            Math.floor(
                (v+2) * 2
            ) % ascii.length;

            ctx.fillStyle =
            `hsl(${x*0.2+y*0.2},100%,70%)`;

            ctx.fillText(
                ascii[index],
                x,
                y
            );
        }
    }
}

/////////////////////////////////////////////////
// NEURAL STORM (LIFE GRID)
/////////////////////////////////////////////////

let stormTick = 0;

function drawNeuralStorm(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    for(let i=0;i<200;i++){

        const a = i * 0.3 + stormTick;

        const r =
        Math.sin(i*0.1 + stormTick) * 300;

        const x =
        w/2 + Math.cos(a) * r;

        const y =
        h/2 + Math.sin(a*1.3) * r;

        ctx.fillStyle =
        `hsla(${i*2 + stormTick*10},100%,70%,0.5)`;

        ctx.beginPath();
        ctx.arc(x,y,2,0,Math.PI*2);
        ctx.fill();

        ctx.strokeStyle =
        `rgba(255,255,255,0.1)`;

        ctx.beginPath();
        ctx.moveTo(w/2,h/2);
        ctx.lineTo(x,y);
        ctx.stroke();
    }

    stormTick += 0.01;
}

/////////////////////////////////////////////////
// GLITCH MODE
/////////////////////////////////////////////////

function drawGlitch(){

    ctx.fillStyle =
    `rgba(${Math.random()*255},0,
    ${Math.random()*255},0.1)`;

    ctx.fillRect(0,0,w,h);

    for(let i=0;i<60;i++){

        ctx.fillStyle =
        `hsl(${Math.random()*360},100%,60%)`;

        ctx.fillRect(
            Math.random()*w,
            Math.random()*h,
            Math.random()*200,
            2 + Math.random()*10
        );
    }

    ctx.font = "30px monospace";
    ctx.fillStyle = "white";

    const texts = [
        "REALITY ERROR",
        "SYSTEM CORRUPTED",
        "VOID ACTIVE",
        "MEMORY LEAK",
        "CHAOS.EXE"
    ];

    ctx.fillText(
        texts[Math.floor(Math.random()*texts.length)],
        Math.random()*w,
        Math.random()*h
    );
}
let mazeT = 0;

function drawMaze(){

    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,w,h);

    const size = 40;

    for(let x=0;x<w;x+=size){
        for(let y=0;y<h;y+=size){

            const v =
            Math.sin(x*0.01 + mazeT) +
            Math.cos(y*0.01 + mazeT);

            ctx.strokeStyle =
            `hsla(${v*80+mazeT*50},100%,70%,0.7)`;

            ctx.beginPath();

            if(v>0){
                ctx.moveTo(x,y);
                ctx.lineTo(x+size,y+size);
            } else {
                ctx.moveTo(x+size,y);
                ctx.lineTo(x,y+size);
            }

            ctx.stroke();
        }
    }

    mazeT += 0.02;
}
let terminalLines = [
    "booting chaos...",
    "loading reality.dll",
    "injecting organism core",
    "warning: stability low"
];

let termScroll = 0;

function drawTerminal(){

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,w,h);

    ctx.fillStyle = "#00ff66";
    ctx.font = "16px monospace";

    const noise =
    Math.random()<0.05 ? "█▒░" : "";

    terminalLines.push(
        "> system tick " + Date.now()
    );

    if(terminalLines.length>30)
        terminalLines.shift();

    for(let i=0;i<terminalLines.length;i++){

        ctx.fillText(
            terminalLines[i] + noise,
            20,
            30 + i*20
        );
    }

    termScroll++;
}
let xpT = 0;

function drawXP(){

    ctx.fillStyle = "#0000aa";
    ctx.fillRect(0,0,w,h);

    const msgs = [
        "A problem has been detected",
        "CHAOS_KERNEL_FAULT",
        "MEMORY CORRUPTION",
        "STOP: 0x0000DEAD",
        "reality.exe has stopped working",
        "press any key to continue suffering"
    ];

    ctx.fillStyle = "white";
    ctx.font = "18px monospace";

    msgs.forEach((m,i)=>{

        const jitter =
        Math.sin(xpT*0.1+i)*5;

        ctx.fillText(
            m,
            80 + jitter,
            120 + i*40
        );
    });

    xpT++;
}
function drawGrid(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    const size = 40;

    for(let x=0;x<w;x+=size){
        for(let y=0;y<h;y+=size){

            const glow =
            Math.sin(x*0.01+y*0.01+Date.now()*0.002);

            ctx.strokeStyle =
            `rgba(0,200,255,${0.3+glow*0.2})`;

            ctx.strokeRect(x,y,size,size);
        }
    }
}
const stars =
Array.from({length:300},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    z:Math.random()*2+0.2
}));

function drawStars(){

    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,w,h);

    for(let s of stars){

        s.y += s.z*2;

        if(s.y>h){
            s.y=0;
            s.x=Math.random()*w;
        }

        ctx.fillStyle =
        `rgba(255,255,255,${s.z})`;

        ctx.fillRect(s.x,s.y,s.z*2,s.z*2);
    }
}

/////////////////////////////////////////////////
// ANIMATE
/////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    switch (mode) {
        case "organism":
            drawOrganism();
            break;

        case "swarm":
            drawSwarm();
            break;

        case "bionet":
            drawBioNet();
            break;

        case "cells":
            drawCells();
            break;

        case "recursive":
            drawRecursive();
            break;

        case "fracture":
            drawFracture();
            break;

        case "vhs":
            drawVHS();
            break;
        case "vhs1":
            drawVHS1();
            break;

        case "ascii":
            drawASCII();
            break;

        case "storm":
            drawNeuralStorm();
            break;

        case "glitch":
            drawGlitch();
            break;

        case "matrix":
            drawMatrix();
            break;

        case "maze":
            drawMaze();
            break;

        case "terminal":
            drawTerminal();
            break;

        case "xp":
            drawXP();
            break;

        case "grid":
            drawGrid();
            break;

        case "stars":
            drawStars();
            break;
    }

}

animate();

</script>

</body>
</html>
